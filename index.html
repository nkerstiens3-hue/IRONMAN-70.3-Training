<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="70.3 Tracker">
<meta name="theme-color" content="#0a0f1e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>70.3 Training Tracker</title>
<style>
  :root {
    --bg:#0a0f1e; --surface:#131c30; --surface2:#1a2540; --border:rgba(255,255,255,0.08);
    --text:#f0f4ff; --muted:#7a8aaa; --accent:#4FC3F7; --accent2:#81D4FA;
    --safe-top:env(safe-area-inset-top,0px); --safe-bot:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;}
  #app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top);}
  .header{padding:14px 20px 10px;background:var(--bg);border-bottom:0.5px solid var(--border);flex-shrink:0;}
  .header-row{display:flex;justify-content:space-between;align-items:flex-start;}
  .header-title{font-size:20px;font-weight:700;letter-spacing:-0.5px;}
  .header-sub{font-size:12px;color:var(--muted);margin-top:2px;}
  .race-badge{background:var(--surface2);border:0.5px solid var(--accent);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--accent);font-weight:600;white-space:nowrap;}
  .prog-strip{height:3px;background:var(--surface2);flex-shrink:0;}
  .prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .6s;}
  .tabs{display:flex;background:var(--surface);border-bottom:0.5px solid var(--border);flex-shrink:0;}
  .tab{flex:1;padding:10px 4px 8px;text-align:center;cursor:pointer;font-size:10px;color:var(--muted);font-weight:500;border:none;background:none;display:flex;flex-direction:column;align-items:center;gap:2px;-webkit-appearance:none;}
  .tab .ti{font-size:19px;}
  .tab.active{color:var(--accent);}
  .tab-line{display:none;width:18px;height:2px;background:var(--accent);border-radius:2px;margin:1px auto 0;}
  .tab.active .tab-line{display:block;}
  .content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(16px + var(--safe-bot));}
  .section{display:none;padding-top:4px;}
  .section.active{display:block;}
  .card{background:var(--surface);border:0.5px solid var(--border);border-radius:16px;padding:15px 17px;margin:10px 14px;}
  .clabel{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}
  /* Today hero */
  .hero{margin:10px 14px;background:var(--surface);border:0.5px solid var(--border);border-radius:20px;overflow:hidden;}
  .hero-phase{padding:10px 17px 0;font-size:10px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.07em;}
  .hero-body{padding:12px 17px 16px;}
  .hero-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .hero-emoji{font-size:32px;}
  .hero-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em;}
  .hero-text{font-size:15px;font-weight:500;line-height:1.45;color:var(--text);margin-bottom:6px;}
  .hero-extra{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:12px;padding:8px 10px;background:var(--surface2);border-radius:8px;}
  .log-btn{width:100%;padding:13px;border-radius:12px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;-webkit-appearance:none;}
  .log-btn.off{background:var(--surface2);color:var(--text);border:0.5px solid var(--border);}
  .log-btn.on{background:#1b3a1e;color:#4CAF50;border:0.5px solid #4CAF50;}
  .log-btn:active{transform:scale(.97);}
  /* Metrics */
  .mgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin:0 14px 10px;}
  .metric{background:var(--surface);border:0.5px solid var(--border);border-radius:13px;padding:12px 10px;text-align:center;}
  .metric-val{font-size:21px;font-weight:700;line-height:1;}
  .metric-lbl{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.04em;}
  /* Week nav */
  .wnav{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 2px;}
  .wnav-mid{text-align:center;}
  .wnav-title{font-size:15px;font-weight:600;}
  .wnav-sub{font-size:11px;color:var(--muted);margin-top:1px;}
  .narr{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;width:38px;height:38px;font-size:20px;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-appearance:none;}
  .narr:active{background:var(--surface2);}
  /* Week rows */
  .wrows{margin:8px 14px 0;background:var(--surface);border:0.5px solid var(--border);border-radius:16px;overflow:hidden;}
  .wrow{display:flex;align-items:flex-start;gap:9px;padding:11px 15px;border-bottom:0.5px solid var(--border);}
  .wrow:last-child{border-bottom:none;}
  .wrow.today{background:rgba(79,195,247,.07);}
  .wday{font-size:11px;font-weight:600;color:var(--muted);min-width:26px;padding-top:2px;}
  .wicon{font-size:16px;flex-shrink:0;padding-top:1px;}
  .wtext{font-size:12px;flex:1;line-height:1.45;color:var(--text);}
  .wlog{background:none;border:0.5px solid var(--border);border-radius:7px;width:30px;height:30px;font-size:14px;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-appearance:none;margin-top:1px;}
  .wlog.on{background:#1b3a1e;border-color:#4CAF50;color:#4CAF50;}
  /* Progress bars */
  .pbar{margin-bottom:13px;}
  .pbar-hd{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;}
  .pbar-bg{background:var(--surface2);border-radius:5px;height:7px;overflow:hidden;}
  .pbar-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .5s;}
  .pbar-wks{font-size:10px;color:var(--muted);margin-top:2px;}
  /* Zone rows */
  .zrow{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--border);}
  .zrow:last-child{border-bottom:none;}
  .zdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:3px;}
  .zz{font-size:12px;font-weight:700;min-width:20px;}
  .zname{font-size:12px;font-weight:600;min-width:90px;}
  .zpct{font-size:11px;color:var(--muted);min-width:52px;}
  .zdesc{font-size:11px;color:var(--muted);line-height:1.4;}
  /* Strength tab */
  .stab-switch{display:flex;gap:6px;margin:0 14px 10px;background:var(--surface);border-radius:10px;padding:4px;}
  .stab-btn{flex:1;padding:7px;border-radius:7px;border:none;font-size:12px;font-weight:500;cursor:pointer;background:transparent;color:var(--muted);-webkit-appearance:none;}
  .stab-btn.active{background:var(--surface2);color:var(--text);}
  .sexrow{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--border);}
  .sexrow:last-child{border-bottom:none;}
  .sexname{font-size:12px;font-weight:600;flex:1.2;line-height:1.4;}
  .sexmuscle{font-size:11px;color:var(--muted);flex:1;line-height:1.4;}
  .sexprog{font-size:11px;color:var(--accent);flex:1;line-height:1.4;}
  /* Badge colors */
  .b-Run{background:rgba(76,175,80,.15);color:#81C784;}
  .b-Bike{background:rgba(79,195,247,.15);color:#4FC3F7;}
  .b-Swim{background:rgba(149,117,205,.15);color:#CE93D8;}
  .b-Brick{background:rgba(255,152,0,.15);color:#FFB74D;}
  .b-Rest{background:rgba(69,80,96,.3);color:#78909C;}
  .b-Recovery{background:rgba(240,98,146,.15);color:#F48FB1;}
  .b-Strength{background:rgba(255,193,7,.15);color:#FFD54F;}
  .b-Plyo{background:rgba(255,87,34,.15);color:#FF8A65;}
  .quote{font-size:13px;color:var(--muted);font-style:italic;text-align:center;padding:2px 0 6px;line-height:1.6;}
  .pill{display:inline-block;font-size:10px;padding:3px 9px;border-radius:20px;background:rgba(79,195,247,.12);color:var(--accent);font-weight:600;letter-spacing:.04em;margin-bottom:8px;}
  .note-star{font-size:12px;color:#FFD54F;line-height:1.5;padding:6px 0 2px;}
</style>
</head>

{w:45,d:'Thu',t:'Run',x:'RUN 6 mi | Z2'},
{w:45,d:'Fri',t:'Rest',x:'REST / Active Recovery'},
{w:45,d:'Sat',t:'Brick',x:'BRICK: BIKE 40 mi Z3 → RUN 5 mi Z3 | Final race-pace brick'},
{w:45,d:'Sun',t:'Rest',x:'REST'},

// PHASE 6 — TAPER (Week 46)
{w:46,d:'Mon',t:'Run',x:'RUN 4 mi | Z2 | Easy shake-out',note:'🏁 RACE: Sat May 8, 2027. NO strength. NO plyos. Fresh legs only.'},
{w:46,d:'Tue',t:'Swim',x:'SWIM 1000m | Z2 | Easy'},
{w:46,d:'Wed',t:'Bike',x:'BIKE 20 mi | Z2 | Easy spin'},
{w:46,d:'Thu',t:'Run',x:'RUN 3 mi | Z1 | Short & easy'},
{w:46,d:'Fri',t:'Rest',x:'REST / Active Recovery'},
{w:46,d:'Sat',t:'Run',x:'RUN 3 mi | Z1 | Final shakeout — RACE DAY TOMORROW!'},
{w:46,d:'Sun',t:'Rest',x:'REST'},
];

const PHASES = [
  {num:1,name:'Run Base + Bike',s:1,e:9},
  {num:2,name:'Run + Bike',s:10,e:19},
  {num:3,name:'Full Tri Base',s:20,e:30},
  {num:4,name:'Build',s:31,e:40},
  {num:5,name:'Peak',s:41,e:45},
  {num:6,name:'Taper',s:46,e:46},
];

const EMOJI = {Run:'🏃',Bike:'🚴',Swim:'🏊',Brick:'⚡',Rest:'😴',Recovery:'💙',Strength:'🏋️',Plyo:'🦘'};

const STRENGTH_EXERCISES = [
  {name:'Goblet Squat → Barbell Back Squat',muscle:'Quads, glutes, core',p1:'3×12 BW/goblet',p23:'4×6 barbell',p45:'3×5 barbell',benefit:'Bike power, run push-off'},
  {name:'Romanian Deadlift (RDL)',muscle:'Hamstrings, glutes, lower back',p1:'3×12 DB',p23:'4×6 barbell',p45:'3×5 barbell',benefit:'Prevents hamstring injury on run'},
  {name:'Bulgarian Split Squat',muscle:'Quads, glutes, hip stability',p1:'3×10 BW',p23:'4×6 DB/barbell',p45:'3×5',benefit:'Single-leg power = run efficiency'},
  {name:'Hip Thrust / Glute Bridge',muscle:'Glutes, hip extensors',p1:'3×15 BW',p23:'4×8 barbell',p45:'3×6 barbell',benefit:'Glute activation prevents knee/hip injury'},
  {name:'Single-Leg RDL',muscle:'Hamstrings, glutes, ankle stability',p1:'3×10 each',p23:'4×6 each DB',p45:'3×5 each',benefit:'Balance + injury prevention on run'},
  {name:'Bent-Over Row / Cable Row',muscle:'Lats, rhomboids, mid-back',p1:'3×12 DB',p23:'4×6 barbell',p45:'3×5',benefit:'Swim pull power, aero position posture'},
  {name:'Lat Pulldown / Pull-Up',muscle:'Lats, biceps',p1:'3×10 band/machine',p23:'4×6',p45:'3×5',benefit:'Swim catch & pull power'},
  {name:'Dumbbell Shoulder Press',muscle:'Deltoids, rotator cuff',p1:'3×12 light DB',p23:'4×8 DB',p45:'3×6',benefit:'Swim endurance, shoulder stability'},
  {name:'Rotator Cuff Circuit (Y-T-W)',muscle:'Rotator cuff, scapular stabilizers',p1:'3×15 band',p23:'3×12 band',p45:'2×12 band',benefit:'Swim injury prevention — critical'},
  {name:'Plank / Dead Bug / Pallof Press',muscle:'Core — anti-rotation & stability',p1:'3×30 sec each',p23:'3×40 sec / 3×10',p45:'2×30 sec',benefit:'Aero position on bike, run form'},
  {name:'Copenhagen Plank',muscle:'Hip adductors',p1:'3×20 sec each',p23:'3×30 sec each',p45:'2×20 sec',benefit:'Prevents groin/hip injury'},
  {name:'Calf Raises (single-leg)',muscle:'Calves, Achilles',p1:'3×15 each',p23:'4×10 each weighted',p45:'3×8 each',benefit:'Run push-off, Achilles resilience'},
];

function getPhase(wk){return PHASES.find(p=>wk>=p.s&&wk<=p.e)||PHASES[0];}
function getWO(wk,day){return PLAN.find(p=>p.w===wk&&p.d===day)||{t:'Rest',x:'REST'};}

function todayInfo(){
  const t=new Date();t.setHours(0,0,0,0);
  const s=new Date(PLAN_START);s.setHours(0,0,0,0);
  const diff=Math.floor((t-s)/86400000);
  const wk=diff<0?0:Math.min(Math.floor(diff/7)+1,46);
  const dow=t.getDay();
  const day=DAYS[dow===0?6:dow-1];
  const dtr=Math.ceil((RACE_DAY-t)/86400000);
  return{wk:Math.max(wk,1),day,dtr,date:t};
}

let logged={};
let viewWeek=1;
let strSubTab='exercises';
const{wk:todayWk,day:todayDay,dtr,date:todayDate}=todayInfo();
viewWeek=todayWk;

function loadLogged(){try{const s=localStorage.getItem('703v2_logged');if(s)logged=JSON.parse(s);}catch(e){}}
function saveLogged(){try{localStorage.setItem('703v2_logged',JSON.stringify(logged));}catch(e){}}
function isLogged(wk,day){return!!logged[`${wk}_${day}`];}
function toggleLog(wk,day){
  const k=`${wk}_${day}`;
  if(logged[k])delete logged[k];else logged[k]=1;
  saveLogged();render();
}
function daysLeft(){const t=new Date();t.setHours(0,0,0,0);return Math.ceil((RACE_DAY-t)/86400000);}

function updateHeader(){
  document.getElementById('hdr-title').textContent=`Week ${todayWk} of 46`;
  document.getElementById('hdr-sub').textContent=todayDate.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const d=daysLeft();
  document.getElementById('race-badge').textContent=`${d}d to race`;
  document.getElementById('prog-fill').style.width=Math.round(todayWk/46*100)+'%';
}

let activeTab='today';
function showTab(name){
  activeTab=name;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['today','week','progress','strength','zones'][i]===name));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  render();
}

function render(){
  if(activeTab==='today')renderToday();
  else if(activeTab==='week')renderWeek();
  else if(activeTab==='progress')renderProgress();
  else if(activeTab==='strength')renderStrength();
  else if(activeTab==='zones')renderZones();
}

function renderToday(){
  const wo=getWO(todayWk,todayDay);
  const phase=getPhase(todayWk);
  const lg=isLogged(todayWk,todayDay);
  const wkNote=PLAN.find(p=>p.w===todayWk&&p.note)?.note||'';
  const el=document.getElementById('tab-today');
  let extras='';
  if(wo.plyo)extras+=`<div style="font-size:11px;color:#FF8A65;margin-bottom:6px;">🦘 PLYO: ${wo.plyo}</div>`;
  if(wo.str)extras+=`<div style="font-size:11px;color:#FFD54F;margin-bottom:6px;">🏋️ STR: ${wo.str}</div>`;
  el.innerHTML=`
    <div class="hero">
      <div class="hero-phase">Phase ${phase.num}: ${phase.name} · Wks ${phase.s}–${phase.e}</div>
      <div class="hero-body">
        <div class="hero-top">
          <span class="hero-emoji">${EMOJI[wo.t]||'😴'}</span>
          <span class="hero-badge b-${wo.t}">${wo.t.toUpperCase()}</span>
        </div>
        <div class="hero-text">${wo.x}</div>
        ${extras?`<div class="hero-extra">${extras}</div>`:''}
        ${wo.t!=='Rest'?`<button class="log-btn ${lg?'on':'off'}" onclick="toggleLog(${todayWk},'${todayDay}')">${lg?'✓ Completed':'Mark as done'}</button>`:`<div style="color:var(--muted);font-size:13px;">Rest day — recover well 💤</div>`}
      </div>
    </div>
    ${wkNote?`<div class="note-star" style="margin:0 14px 2px;">${wkNote}</div>`:''}
    <div class="mgrid">
      <div class="metric"><div class="metric-val">${todayWk}</div><div class="metric-lbl">Week</div></div>
      <div class="metric"><div class="metric-val">${phase.num}/6</div><div class="metric-lbl">Phase</div></div>
      <div class="metric"><div class="metric-val">${daysLeft()}</div><div class="metric-lbl">Days left</div></div>
    </div>
    <div class="card">
      <div class="clabel">Plan progress</div>
      <div style="background:var(--surface2);border-radius:8px;height:10px;overflow:hidden;margin-bottom:7px;">
        <div style="width:${Math.round(todayWk/46*100)}%;height:100%;border-radius:8px;background:linear-gradient(90deg,var(--accent),var(--accent2));"></div>
      </div>
      <div style="font-size:11px;color:var(--muted);text-align:right;">${Math.round(todayWk/46*100)}% complete · Race: Sat May 8, 2027</div>
    </div>
  `;
}

function renderWeek(){
  const wk=viewWeek;
  const phase=getPhase(wk);
  const ws=new Date(PLAN_START);ws.setDate(ws.getDate()+(wk-1)*7);
  const we=new Date(ws);we.setDate(we.getDate()+6);
  const fmt=d=>d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  let totalMi=0,swimM=0;
  const rows=DAYS.map(d=>{
    const wo=getWO(wk,d);
    const m=wo.x.match(/(\d+(?:\.\d+)?)\s*mi/);if(m)totalMi+=parseFloat(m[1]);
    const sm=wo.x.match(/(\d+)m\b/);if(sm&&wo.t==='Swim')swimM+=parseInt(sm[1]);
    return{d,wo};
  });
  const active=rows.filter(r=>r.wo.t!=='Rest').length;
  const done=rows.filter(r=>isLogged(wk,r.d)).length;
  const isThisWk=wk===todayWk;
  const wkNote=PLAN.find(p=>p.w===wk&&p.note)?.note||'';
  document.getElementById('tab-week').innerHTML=`
    <div class="wnav">
      <button class="narr" onclick="changeWeek(-1)">‹</button>
      <div class="wnav-mid">
        <div class="wnav-title">Week ${wk}${isThisWk?' · current':''}</div>
        <div class="wnav-sub">${fmt(ws)} – ${fmt(we)} · ${phase.name}</div>
      </div>
      <button class="narr" onclick="changeWeek(1)">›</button>
    </div>
    <div class="mgrid" style="margin-top:6px;">
      <div class="metric"><div class="metric-val">${active}</div><div class="metric-lbl">Active</div></div>
      <div class="metric"><div class="metric-val">${totalMi.toFixed(0)}</div><div class="metric-lbl">Miles</div></div>
      <div class="metric"><div class="metric-val">${done}/${active}</div><div class="metric-lbl">Done</div></div>
    </div>
    ${wkNote?`<div class="note-star" style="margin:2px 14px 4px;">${wkNote}</div>`:''}
    <div class="wrows">
      ${rows.map(({d,wo})=>{
        const isToday=isThisWk&&d===todayDay;
        const lg=isLogged(wk,d);
        let sub='';
        if(wo.plyo)sub+=`<div style="font-size:10px;color:#FF8A65;margin-top:2px;">🦘 ${wo.plyo}</div>`;
        if(wo.str)sub+=`<div style="font-size:10px;color:#FFD54F;margin-top:2px;">🏋️ ${wo.str}</div>`;
        return`<div class="wrow${isToday?' today':''}">
          <span class="wday">${d}</span>
          <span class="wicon">${EMOJI[wo.t]||'😴'}</span>
          <span class="wtext">${wo.x}${sub}</span>
          ${wo.t!=='Rest'?`<button class="wlog${lg?' on':''}" onclick="toggleLog(${wk},'${d}')">${lg?'✓':'+'}</button>`:''}
        </div>`;
      }).join('')}
    </div>
    ${swimM?`<div style="text-align:center;font-size:11px;color:var(--muted);margin:8px 0;">🏊 ${swimM}m swim this week</div>`:''}
  `;
}

function renderProgress(){
  const total=PLAN.filter(p=>p.t!=='Rest').length;
  const done=PLAN.filter(p=>p.t!=='Rest'&&isLogged(p.w,p.d)).length;
  const byPhase=PHASES.map(ph=>{
    const pw=PLAN.filter(p=>p.t!=='Rest'&&p.w>=ph.s&&p.w<=ph.e);
    const pd=pw.filter(p=>isLogged(p.w,p.d)).length;
    return{...ph,total:pw.length,done:pd};
  });
  document.getElementById('tab-progress').innerHTML=`
    <div class="mgrid">
      <div class="metric"><div class="metric-val">${done}</div><div class="metric-lbl">Done</div></div>
      <div class="metric"><div class="metric-val">${total-done}</div><div class="metric-lbl">Left</div></div>
      <div class="metric"><div class="metric-val">${daysLeft()}</div><div class="metric-lbl">Days</div></div>
    </div>
    <div class="card">
      <div class="clabel">By phase</div>
      ${byPhase.map(ph=>`
        <div class="pbar">
          <div class="pbar-hd"><span style="font-weight:500;">Phase ${ph.num}: ${ph.name}</span><span style="color:var(--muted)">${ph.done}/${ph.total}</span></div>
          <div class="pbar-bg"><div class="pbar-fill" style="width:${ph.total?Math.round(ph.done/ph.total*100):0}%"></div></div>
          <div class="pbar-wks">Weeks ${ph.s}–${ph.e}</div>
        </div>`).join('')}
    </div>
    <div class="card">
      <div class="clabel">Race day</div>
      <div style="font-size:15px;font-weight:600;margin-bottom:6px;">🏁 Saturday, May 8, 2027</div>
      <div style="font-size:12px;color:var(--muted);line-height:1.9;">
        Swim 1.2 mi (1,900m) → Bike 56 mi → Run 13.1 mi<br>
        Total: 70.3 miles · 46 weeks of training
      </div>
    </div>
  `;
}

function renderStrength(){
  const phase=getPhase(todayWk);
  const el=document.getElementById('tab-strength');
  el.innerHTML=`
    <div class="card" style="margin-bottom:8px;">
      <div class="clabel">Current phase — ${phase.name}</div>
      <div style="font-size:12px;color:var(--muted);line-height:1.7;">
        ${phase.num<=2?'2×/week (Wed + Sat) · Stabilization → Max Strength':
          phase.num===3?'2×/week (Wed + Thu) · Max Strength + swim rotator cuff':
          phase.num===4?'1–2×/week (Wed, opt Thu) · Maintenance — heavy but brief':
          phase.num===5?'1×/week (Wed only) · Pure maintenance, no PRs':
          'NO strength training — race week, fresh legs only'}
      </div>
    </div>
    <div style="display:flex;gap:5px;margin:0 14px 10px;background:var(--surface);border-radius:10px;padding:4px;">
      <button class="stab-btn ${strSubTab==='exercises'?'active':''}" onclick="setStrTab('exercises')">Exercise Library</button>
      <button class="stab-btn ${strSubTab==='sessions'?'active':''}" onclick="setStrTab('sessions')">Sample Sessions</button>
      <button class="stab-btn ${strSubTab==='plyo'?'active':''}" onclick="setStrTab('plyo')">Plyometrics</button>
    </div>
    <div id="str-content"></div>
  `;
  renderStrContent();
}

function setStrTab(t){strSubTab=t;renderStrContent();}

function renderStrContent(){
  const el=document.getElementById('str-content');
  if(!el)return;
  const phase=getPhase(todayWk);
  if(strSubTab==='exercises'){
    el.innerHTML=`<div class="card">
      <div class="clabel">Core moves by phase</div>
      ${STRENGTH_EXERCISES.map(e=>`
        <div class="sexrow">
          <div class="sexname">${e.name}</div>
          <div class="sexmuscle">${e.muscle}</div>
          <div class="sexprog">${phase.num<=1?e.p1:phase.num<=3?e.p23:e.p45}</div>
        </div>`).join('')}
    </div>`;
  } else if(strSubTab==='sessions'){
    const sessions=[
      {phase:'Phase 1 (Wks 1–9) ~30 min',exercises:'Goblet Squat 3×12 · Hip Thrust 3×15 · Single-Leg RDL 3×10ea · Bent-Over Row 3×12 · Rotator Cuff Circuit 3×15 · Dead Bug 3×30sec · Calf Raises 3×15ea',note:'All bodyweight or very light. Focus on form. Rest 45 sec.'},
      {phase:'Phase 2–3 (Wks 10–30) ~40 min',exercises:'Barbell Squat 4×6 · RDL 4×6 · Bulgarian Split Squat 4×6ea · Lat Pulldown 4×6 · DB Shoulder Press 4×8 · Rotator Cuff 3×12 · Copenhagen Plank 3×30sec',note:'Progressively heavier each week. Last 2 reps hard. Rest 90 sec.'},
      {phase:'Phase 4–5 Maintenance (Wks 31–45) ~25 min',exercises:'Barbell Squat 3×5 · RDL 3×5 · Pull-Up or Row 3×5 · Hip Thrust 3×6 · Rotator Cuff 2×12 (keep this always)',note:'Heavy but brief. 5 exercises max. Don\'t fatigue yourself. Rest 2 min.'},
    ];
    el.innerHTML=`<div class="card">${sessions.map(s=>`
      <div style="margin-bottom:16px;padding-bottom:14px;border-bottom:0.5px solid var(--border);">
        <div style="font-size:12px;font-weight:600;color:var(--accent);margin-bottom:5px;">${s.phase}</div>
        <div style="font-size:12px;color:var(--text);line-height:1.6;margin-bottom:4px;">${s.exercises}</div>
        <div style="font-size:11px;color:var(--muted);">${s.note}</div>
      </div>`).join('')}<div style="font-size:11px;color:var(--muted);padding-top:4px;">Always: 48hrs between sessions · After endurance on Z2 days · Focus: glutes, core, hips, shoulders</div></div>`;
  } else {
    const plyo=[
      {phase:'Phase 1 (Wks 1–9) — 1×/wk Mon',ex:'Ankle Hops + Skips',sets:'3×10 ankle hops + 3×20 skipping steps before Mon run. Low impact intro.'},
      {phase:'Phase 2 (Wks 10–19) — 1×/wk Mon',ex:'Ankle Hops + Jump Squats + Bounds',sets:'3×10 ankle hops, 3×8 jump squats (land soft), 3×10 bounding steps before Mon run.'},
      {phase:'Phase 3 (Wks 20–30) — 2×/wk Mon+Thu',ex:'Split Lunge Jumps + Single-Leg Hops + High Skips',sets:'Mon + Thu before run. 3×10 split lunge jumps, 3×8 single-leg hops each leg, 3×20 high skips. ~12 min.'},
      {phase:'Phase 4–5 (Wks 31–45) — 2×/wk Mon+Thu',ex:'Full Circuit: Lunge Jumps + Lateral Hops + Depth Step-offs + Skips',sets:'Mon + Thu before run. 3×12 split lunge jumps, 3×10 lateral hops, 3×8 depth step-offs, 3×20 skips. ~15 min. Skip recovery weeks.'},
      {phase:'Phase 6 (Wk 46) — NONE',ex:'No plyos race week',sets:'Fresh legs for race day.'},
    ];
    el.innerHTML=`<div class="card">${plyo.map(p=>`
      <div style="margin-bottom:14px;padding-bottom:12px;border-bottom:0.5px solid var(--border);">
        <div style="font-size:11px;color:#FF8A65;font-weight:600;margin-bottom:4px;">${p.phase}</div>
        <div style="font-size:12px;font-weight:500;color:var(--text);margin-bottom:3px;">${p.ex}</div>
        <div style="font-size:11px;color:var(--muted);">${p.sets}</div>
      </div>`).join('')}<div style="font-size:11px;color:var(--muted);padding-top:2px;">Always BEFORE runs — never day before a key long run</div></div>`;
  }
}

function renderZones(){
  const zones=[
    {z:'Z1',name:'Recovery',pct:'50–60%',c:'#5DCAA5',d:'Easy recovery, warm-up, cool-down'},
    {z:'Z2',name:'Aerobic Base',pct:'60–70%',c:'#4FC3F7',d:'Long slow distance — the ENGINE builder. ~80% of all training.'},
    {z:'Z3',name:'Tempo',pct:'70–80%',c:'#EF9F27',d:'Comfortably hard, race-sustainable effort'},
    {z:'Z4',name:'Threshold',pct:'80–90%',c:'#E24B4A',d:'Hard — lactate threshold intervals'},
    {z:'Z5',name:'VO2 Max',pct:'90–100%',c:'#A32D2D',d:'Max effort — short intervals only'},
  ];
  document.getElementById('tab-zones').innerHTML=`
    <div class="card">
      <div class="clabel">Heart rate zones</div>
      ${zones.map(z=>`<div class="zrow">
        <div class="zdot" style="background:${z.c}"></div>
        <div class="zz" style="color:${z.c}">${z.z}</div>
        <div class="zname">${z.name}</div>
        <div class="zpct">${z.pct}</div>
        <div class="zdesc">${z.d}</div>
      </div>`).join('')}
    </div>
    <div class="card"><p class="quote">"80% of training should feel easy (Z2).<br>Trust the process."</p></div>
    <div class="card">
      <div class="clabel">Phase overview</div>
      <div style="font-size:12px;color:var(--muted);line-height:2.0;">
        <div><span style="color:var(--accent);font-weight:600;">Wks 1–9</span> Run Base + Bike · 4 days/wk · Strength 2×/wk · Plyo 1×/wk</div>
        <div><span style="color:var(--accent);font-weight:600;">Wks 10–19</span> Run + Bike · 4 days/wk · Bricks start Wk 14 · Long run to 13 mi</div>
        <div><span style="color:var(--accent);font-weight:600;">Wks 20–30</span> Full Tri Base · 5 days/wk · Swim intro · Thu activates</div>
        <div><span style="color:var(--accent);font-weight:600;">Wks 31–40</span> Build · 5 days/wk · Intensity ↑ · Longest sessions</div>
        <div><span style="color:var(--accent);font-weight:600;">Wks 41–45</span> Peak · 5 days/wk · Race-sim bricks · Hardest week</div>
        <div><span style="color:var(--accent);font-weight:600;">Wk 46</span> Taper · Volume –50% · No strength · No plyos</div>
      </div>
    </div>
  `;
}

function changeWeek(dir){viewWeek=Math.min(Math.max(viewWeek+dir,1),46);renderWeek();}

if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}

loadLogged();
updateHeader();
renderToday();
</script>
</body>
</html>
