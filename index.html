<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="70.3 Tracker">
<meta name="theme-color" content="#0a0f1e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>70.3 — Nicholas & Chase</title>
<style>
:root{
  --bg:#0a0f1e;--surface:#131c30;--surface2:#1a2540;--border:rgba(255,255,255,0.08);
  --text:#f0f4ff;--muted:#6a7a9a;--accent:#4FC3F7;--accent2:#81D4FA;
  --nick:#4FC3F7;--chase:#F472B6;
  --run:#4CAF50;--bike:#4FC3F7;--swim:#9575CD;--brick:#FF9800;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;}
#app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top);}

/* HEADER */
.hdr{padding:12px 16px 10px;background:var(--bg);border-bottom:0.5px solid var(--border);flex-shrink:0;}
.hdr-row{display:flex;justify-content:space-between;align-items:center;}
.hdr-title{font-size:18px;font-weight:700;letter-spacing:-0.3px;}
.hdr-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.race-chip{background:var(--surface2);border:0.5px solid var(--accent);border-radius:20px;padding:3px 9px;font-size:11px;color:var(--accent);font-weight:600;white-space:nowrap;}

/* ATHLETE SWITCHER */
.athlete-bar{display:flex;gap:0;background:var(--surface);border-bottom:0.5px solid var(--border);flex-shrink:0;}
.ath-btn{flex:1;padding:9px 4px;text-align:center;border:none;background:none;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;-webkit-appearance:none;}
.ath-btn.nick.active{color:var(--nick);border-bottom-color:var(--nick);}
.ath-btn.chase.active{color:var(--chase);border-bottom-color:var(--chase);}

/* PROG STRIP */
.prog-strip{height:2px;background:var(--surface2);flex-shrink:0;}
.prog-fill{height:100%;transition:width .6s;}
.prog-fill.nick{background:linear-gradient(90deg,var(--nick),var(--accent2));}
.prog-fill.chase{background:linear-gradient(90deg,var(--chase),#f9a8d4);}

/* TABS */
.tabs{display:flex;background:var(--surface);border-bottom:0.5px solid var(--border);flex-shrink:0;}
.tab{flex:1;padding:9px 2px 7px;text-align:center;cursor:pointer;font-size:9px;color:var(--muted);font-weight:500;border:none;background:none;display:flex;flex-direction:column;align-items:center;gap:2px;-webkit-appearance:none;}
.tab .ti{font-size:17px;}
.tab.active{color:var(--accent);}
.tab-line{display:none;width:16px;height:2px;background:var(--accent);border-radius:2px;margin:1px auto 0;}
.tab.active .tab-line{display:block;}

/* CONTENT */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(16px + var(--safe-bot));}
.section{display:none;padding-top:4px;}
.section.active{display:block;}

/* CARDS */
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:16px;padding:14px 16px;margin:10px 14px;}
.clabel{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}

/* TODAY HERO */
.hero{margin:10px 14px;background:var(--surface);border:0.5px solid var(--border);border-radius:20px;overflow:hidden;}
.hero-phase{padding:9px 16px 0;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;}
.hero-phase.nick{color:var(--nick);}
.hero-phase.chase{color:var(--chase);}
.hero-body{padding:11px 16px 15px;}
.hero-top{display:flex;align-items:center;gap:10px;margin-bottom:7px;}
.hero-emoji{font-size:30px;}
.hero-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em;}
.hero-text{font-size:14px;font-weight:500;line-height:1.45;color:var(--text);margin-bottom:5px;}
.hero-extra{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:11px;padding:7px 10px;background:var(--surface2);border-radius:8px;}

/* LOG BUTTONS — dual athlete */
.log-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.log-btn{width:100%;padding:11px 6px;border-radius:11px;border:none;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;-webkit-appearance:none;display:flex;flex-direction:column;align-items:center;gap:2px;}
.log-btn .btn-name{font-size:10px;opacity:.7;font-weight:500;}
.log-btn.off{background:var(--surface2);color:var(--text);border:0.5px solid var(--border);}
.log-btn.nick-on{background:#0d2a3a;color:var(--nick);border:0.5px solid var(--nick);}
.log-btn.chase-on{background:#2d1225;color:var(--chase);border:0.5px solid var(--chase);}
.log-btn:active{transform:scale(.96);}

/* METRICS */
.mgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:0 14px 10px;}
.metric{background:var(--surface);border:0.5px solid var(--border);border-radius:13px;padding:11px 8px;text-align:center;}
.metric-val{font-size:19px;font-weight:700;line-height:1;}
.metric-lbl{font-size:9px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.04em;}

/* WEEK NAV */
.wnav{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 2px;}
.wnav-mid{text-align:center;}
.wnav-title{font-size:14px;font-weight:600;}
.wnav-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.narr{background:var(--surface);border:0.5px solid var(--border);border-radius:9px;width:36px;height:36px;font-size:18px;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-appearance:none;}

/* WEEK ROWS */
.wrows{margin:6px 14px 0;background:var(--surface);border:0.5px solid var(--border);border-radius:16px;overflow:hidden;}
.wrow{display:flex;align-items:flex-start;gap:8px;padding:10px 14px;border-bottom:0.5px solid var(--border);}
.wrow:last-child{border-bottom:none;}
.wrow.today-row{background:rgba(79,195,247,.06);}
.wday{font-size:11px;font-weight:600;color:var(--muted);min-width:24px;padding-top:2px;}
.wicon{font-size:15px;flex-shrink:0;padding-top:1px;}
.wtext{font-size:12px;flex:1;line-height:1.4;color:var(--text);}
.wlog-pair{display:flex;flex-direction:column;gap:3px;flex-shrink:0;}
.wlog{background:none;border:0.5px solid var(--border);border-radius:6px;min-width:28px;height:22px;font-size:10px;font-weight:700;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;-webkit-appearance:none;padding:0 5px;white-space:nowrap;}
.wlog.nick-on{background:#0d2a3a;border-color:var(--nick);color:var(--nick);}
.wlog.chase-on{background:#2d1225;border-color:var(--chase);color:var(--chase);}

/* STATS TAB */
.stat-tabs{display:flex;gap:5px;margin:0 14px 10px;background:var(--surface);border-radius:10px;padding:4px;}
.stat-btn{flex:1;padding:7px;border-radius:7px;border:none;font-size:11px;font-weight:500;cursor:pointer;background:transparent;color:var(--muted);-webkit-appearance:none;transition:all .15s;}
.stat-btn.active{background:var(--surface2);color:var(--text);}

/* MILEAGE BARS */
.mile-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.mile-label{font-size:12px;font-weight:500;min-width:40px;}
.mile-bars{flex:1;}
.mile-bar-wrap{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.mile-bar-bg{flex:1;background:var(--surface2);border-radius:4px;height:6px;overflow:hidden;}
.mile-bar-fill{height:100%;border-radius:4px;transition:width .5s;}
.mile-bar-val{font-size:10px;color:var(--muted);min-width:40px;text-align:right;}
.mile-name{font-size:9px;color:var(--muted);min-width:36px;}

/* PROGRESS BARS */
.pbar{margin-bottom:12px;}
.pbar-hd{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;}
.pbar-bg{background:var(--surface2);border-radius:5px;height:6px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:5px;transition:width .5s;}
.pbar-wks{font-size:10px;color:var(--muted);margin-top:2px;}

/* MODAL OVERLAY */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:flex-end;justify-content:center;padding-bottom:var(--safe-bot);}
.modal-overlay.hidden{display:none;}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 20px calc(20px + var(--safe-bot));width:100%;max-width:480px;border-top:0.5px solid var(--border);}
.modal-title{font-size:16px;font-weight:700;margin-bottom:4px;}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:16px;}
.form-row{margin-bottom:14px;}
.form-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;display:block;}
.form-input{width:100%;background:var(--surface2);border:0.5px solid var(--border);border-radius:10px;padding:11px 13px;font-size:15px;color:var(--text);-webkit-appearance:none;outline:none;}
.form-input:focus{border-color:var(--accent);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px;}
.modal-btn{padding:13px;border-radius:12px;border:none;font-size:14px;font-weight:700;cursor:pointer;-webkit-appearance:none;}
.modal-btn.cancel{background:var(--surface2);color:var(--muted);}
.modal-btn.submit{color:#fff;}
.modal-btn.submit.nick{background:linear-gradient(135deg,#1a6b9a,var(--nick));}
.modal-btn.submit.chase{background:linear-gradient(135deg,#9d174d,var(--chase));}

/* ZONE ROWS */
.zrow{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:0.5px solid var(--border);}
.zrow:last-child{border-bottom:none;}
.zdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.zz{font-size:11px;font-weight:700;min-width:18px;}
.zname{font-size:11px;font-weight:600;min-width:85px;}
.zpct{font-size:10px;color:var(--muted);min-width:48px;}
.zdesc{font-size:10px;color:var(--muted);line-height:1.4;}

/* BADGE COLORS */
.b-Run{background:rgba(76,175,80,.15);color:#81C784;}
.b-Bike{background:rgba(79,195,247,.15);color:#4FC3F7;}
.b-Swim{background:rgba(149,117,205,.15);color:#CE93D8;}
.b-Brick{background:rgba(255,152,0,.15);color:#FFB74D;}
.b-Rest{background:rgba(69,80,96,.3);color:#78909C;}
.b-Recovery{background:rgba(240,98,146,.15);color:#F48FB1;}

.note-row{font-size:11px;color:#FFD54F;line-height:1.5;margin:2px 14px 4px;}
.quote{font-size:12px;color:var(--muted);font-style:italic;text-align:center;line-height:1.6;}
.duo-compare{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 14px 10px;}
.duo-card{background:var(--surface);border:0.5px solid var(--border);border-radius:13px;padding:12px;text-align:center;}
.duo-name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.duo-name.nick{color:var(--nick);}
.duo-name.chase{color:var(--chase);}
.duo-val{font-size:22px;font-weight:700;}
.duo-lbl{font-size:9px;color:var(--muted);margin-top:2px;text-transform:uppercase;}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-row">
      <div><div class="hdr-title">🏁 70.3 Tracker</div><div class="hdr-sub" id="hdr-sub"></div></div>
      <div class="race-chip" id="race-chip"></div>
    </div>
  </div>

  <div class="athlete-bar">
    <button class="ath-btn nick active" onclick="switchAthlete('nicholas')">Nicholas</button>
    <button class="ath-btn chase" onclick="switchAthlete('chase')">Chase</button>
    <button class="ath-btn" onclick="switchAthlete('both')" style="color:var(--muted);">Both</button>
  </div>

  <div class="prog-strip"><div class="prog-fill nick" id="prog-fill" style="width:0%"></div></div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('today')"><span class="ti">☀️</span><span>Today</span><span class="tab-line"></span></button>
    <button class="tab" onclick="showTab('week')"><span class="ti">📅</span><span>Week</span><span class="tab-line"></span></button>
    <button class="tab" onclick="showTab('stats')"><span class="ti">📊</span><span>Stats</span><span class="tab-line"></span></button>
    <button class="tab" onclick="showTab('progress')"><span class="ti">📈</span><span>Progress</span><span class="tab-line"></span></button>
    <button class="tab" onclick="showTab('zones')"><span class="ti">❤️</span><span>Zones</span><span class="tab-line"></span></button>
  </div>

  <div class="content">
    <div id="tab-today" class="section active"></div>
    <div id="tab-week" class="section"></div>
    <div id="tab-stats" class="section"></div>
    <div id="tab-progress" class="section"></div>
    <div id="tab-zones" class="section"></div>
  </div>
</div>

<!-- LOG WORKOUT MODAL -->
<div class="modal-overlay hidden" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modal">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-sub" id="modal-sub"></div>
    <div class="form-row">
      <label class="form-label">Distance covered</label>
      <input class="form-input" id="inp-distance" type="text" placeholder="e.g. 5.2 mi or 800m">
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label class="form-label">Avg pace / speed</label>
        <input class="form-input" id="inp-pace" type="text" placeholder="e.g. 8:30/mi">
      </div>
      <div class="form-row">
        <label class="form-label">Avg heart rate</label>
        <input class="form-input" id="inp-hr" type="number" placeholder="e.g. 148">
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">Notes (optional)</label>
      <input class="form-input" id="inp-notes" type="text" placeholder="How did it feel?">
    </div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-btn submit" id="modal-submit" onclick="submitLog()">Save</button>
    </div>
  </div>
</div>

const EMOJI={Run:'🏃',Bike:'🚴',Swim:'🏊',Brick:'⚡',Rest:'😴',Recovery:'💙'};

// ── STATE ──────────────────────────────────────────────────────────────────
let athlete='nicholas'; // 'nicholas' | 'chase' | 'both'
let activeTab='today';
let viewWeek=1;
let statSubTab='alltime';
// logged[athlete][wk_day] = {distance, pace, hr, notes, ts}
let logged={nicholas:{},chase:{}};
let pendingLog=null; // {athlete, wk, day, wo}

function getPhase(wk){return PHASES.find(p=>wk>=p.s&&wk<=p.e)||PHASES[0];}
function getWO(wk,day){return PLAN.find(p=>p.w===wk&&p.d===day)||{t:'Rest',x:'REST'};}

function todayInfo(){
  const t=new Date();t.setHours(0,0,0,0);
  const s=new Date(PLAN_START);s.setHours(0,0,0,0);
  const diff=Math.floor((t-s)/86400000);
  const wk=diff<0?0:Math.min(Math.floor(diff/7)+1,46);
  const dow=t.getDay();
  return{wk:Math.max(wk,1),day:DAYS[dow===0?6:dow-1],date:t};
}

const TI=todayInfo();
const todayWk=TI.wk, todayDay=TI.day, todayDate=TI.date;
viewWeek=todayWk;

function daysLeft(){const t=new Date();t.setHours(0,0,0,0);return Math.ceil((RACE_DAY-t)/86400000);}

function loadData(){
  try{const s=localStorage.getItem('703v3_data');if(s)logged=JSON.parse(s);}
  catch(e){logged={nicholas:{},chase:{}};}
  if(!logged.nicholas)logged.nicholas={};
  if(!logged.chase)logged.chase={};
}
function saveData(){try{localStorage.setItem('703v3_data',JSON.stringify(logged));}catch(e){}}

function isLogged(ath,wk,day){return!!logged[ath][`${wk}_${day}`];}
function getLog(ath,wk,day){return logged[ath][`${wk}_${day}`]||null;}

// ── MODAL ──────────────────────────────────────────────────────────────────
function openLogModal(ath,wk,day,wo){
  pendingLog={ath,wk,day,wo};
  const existing=getLog(ath,wk,day);
  document.getElementById('modal-title').textContent=`${ATH_LABEL[ath]} — ${day} Wk${wk}`;
  document.getElementById('modal-sub').textContent=wo.x;
  document.getElementById('inp-distance').value=existing?.distance||'';
  document.getElementById('inp-pace').value=existing?.pace||'';
  document.getElementById('inp-hr').value=existing?.hr||'';
  document.getElementById('inp-notes').value=existing?.notes||'';
  const btn=document.getElementById('modal-submit');
  btn.className=`modal-btn submit ${ath}`;
  btn.textContent='Save workout';
  document.getElementById('modal-overlay').classList.remove('hidden');
}

function closeModal(){document.getElementById('modal-overlay').classList.add('hidden');pendingLog=null;}
function closeModalOutside(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}

function submitLog(){
  if(!pendingLog)return;
  const{ath,wk,day}=pendingLog;
  const dist=document.getElementById('inp-distance').value.trim();
  const pace=document.getElementById('inp-pace').value.trim();
  const hr=document.getElementById('inp-hr').value.trim();
  const notes=document.getElementById('inp-notes').value.trim();
  if(dist||pace||hr||notes){
    logged[ath][`${wk}_${day}`]={distance:dist,pace,hr,notes,ts:Date.now()};
  } else {
    // allow mark-complete with no data
    logged[ath][`${wk}_${day}`]={distance:'',pace:'',hr:'',notes:'',ts:Date.now()};
  }
  saveData();
  closeModal();
  render();
}

// ── HEADER ──────────────────────────────────────────────────────────────────
function updateHeader(){
  document.getElementById('hdr-sub').textContent=todayDate.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  document.getElementById('race-chip').textContent=`${daysLeft()}d to race`;
  const pct=Math.round(todayWk/46*100);
  const fill=document.getElementById('prog-fill');
  fill.style.width=pct+'%';
  fill.className=`prog-fill ${athlete==='chase'?'chase':'nick'}`;
}

// ── TAB SWITCHING ──────────────────────────────────────────────────────────
function switchAthlete(a){
  athlete=a;
  document.querySelectorAll('.ath-btn').forEach(b=>b.classList.remove('active'));
  const map={nicholas:0,chase:1,both:2};
  document.querySelectorAll('.ath-btn')[map[a]].classList.add('active');
  updateHeader();
  render();
}

function showTab(name){
  activeTab=name;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['today','week','stats','progress','zones'][i]===name));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  render();
}

function render(){
  updateHeader();
  if(activeTab==='today')renderToday();
  else if(activeTab==='week')renderWeek();
  else if(activeTab==='stats')renderStats();
  else if(activeTab==='progress')renderProgress();
  else if(activeTab==='zones')renderZones();
}

// ── TODAY ──────────────────────────────────────────────────────────────────
function renderToday(){
  const wo=getWO(todayWk,todayDay);
  const phase=getPhase(todayWk);
  const wkNote=PLAN.find(p=>p.w===todayWk&&p.note)?.note||'';
  const el=document.getElementById('tab-today');

  let extras='';
  if(wo.plyo)extras+=`<div style="font-size:11px;color:#FF8A65;margin-bottom:4px;">🦘 ${wo.plyo}</div>`;
  if(wo.str)extras+=`<div style="font-size:11px;color:#FFD54F;">🏋️ ${wo.str}</div>`;

    <div class="mgrid">
      <div class="metric"><div class="metric-val">${todayWk}</div><div class="metric-lbl">Week</div></div>
      <div class="metric"><div class="metric-val">${phase.num}/6</div><div class="metric-lbl">Phase</div></div>

// ── WEEK ──────────────────────────────────────────────────────────────────

  const wk=viewWeek;
  const phase=getPhase(wk);
  const ws=new Date(PLAN_START);ws.setDate(ws.getDate()+(wk-1)*7);
  const we=new Date(ws);we.setDate(we.getDate()+6);

  const athletes=showBoth?['nicholas','chase']:[athlete];
  const active=rows.filter(r=>r.wo.t!=='Rest').length;

  document.getElementById('tab-week').innerHTML=`
    <div class="wnav">

      <div class="metric"><div class="metric-val">${totalMi.toFixed(0)}</div><div class="metric-lbl">Miles</div></div>
      <div class="metric"><div class="metric-val">${athletes.map((a,i)=>`<span style="color:${a==='nicholas'?'var(--nick)':'var(--chase)'}">${doneCounts[i]}</span>`).join('<span style="color:var(--muted);">/</span>')}/${active}</div><div class="metric-lbl">Done</div></div>
    </div>

        if(wo.plyo)sub+=`<div style="font-size:10px;color:#FF8A65;margin-top:2px;">🦘 ${wo.plyo}</div>`;
        if(wo.str)sub+=`<div style="font-size:10px;color:#FFD54F;margin-top:2px;">🏋️ ${wo.str}</div>`;

            return`<button class="wlog ${lg?a+'-on':''}" onclick="openLogModal('${a}',${wk},'${d}',getWO(${wk},'${d}'))" title="${ATH_LABEL[a]}">

            </button>`;

  `;
}

// ── STATS ──────────────────────────────────────────────────────────────────
function parseMiles(str){
  if(!str)return 0;
  const m=str.match(/([\d.]+)\s*mi/i);if(m)return parseFloat(m[1]);
  const km=str.match(/([\d.]+)\s*km/i);if(km)return parseFloat(km[1])*0.621371;
  const mt=str.match(/([\d.]+)\s*m\b/i);if(mt)return parseFloat(mt[1])*0.000621371;
  const n=parseFloat(str);return isNaN(n)?0:n;
}

function getMileageStats(ath,weekRange){
  let run=0,bike=0,swim=0,workoutCount=0;
  const[wStart,wEnd]=weekRange||[1,46];
  PLAN.forEach(p=>{
    if(p.w<wStart||p.w>wEnd)return;
    const logData=getLog(ath,p.w,p.d);
    if(!logData)return;
    workoutCount++;
    const mi=parseMiles(logData.distance);
    if(p.t==='Run'||p.t==='Recovery')run+=mi;
    else if(p.t==='Bike')bike+=mi;
    else if(p.t==='Swim')swim+=mi;
    else if(p.t==='Brick'){
      // try to split brick
      const bm=p.x.match(/BIKE\s+([\d.]+)\s*mi.*?RUN\s+([\d.]+)\s*mi/i);
      if(bm&&!mi){bike+=parseFloat(bm[1]);run+=parseFloat(bm[2]);}
      else if(mi)bike+=mi;
    }
  });
  return{run,bike,swim,workoutCount};
}

function getPlannedMileage(weekRange){
  let run=0,bike=0,swim=0;
  const[wStart,wEnd]=weekRange||[1,46];
  PLAN.forEach(p=>{
    if(p.w<wStart||p.w>wEnd)return;
    const m=p.x.match(/(\d+(?:\.\d+)?)\s*mi/);
    const sm=p.x.match(/(\d+)m\b/);
    if(p.t==='Run'||p.t==='Recovery'){if(m)run+=parseFloat(m[1]);}
    else if(p.t==='Bike'){if(m)bike+=parseFloat(m[1]);}
    else if(p.t==='Swim'){if(sm)swim+=parseInt(sm[1])/1609.34;}
    else if(p.t==='Brick'){
      const bm=p.x.match(/BIKE\s+([\d.]+)\s*mi.*?RUN\s+([\d.]+)\s*mi/i);
      if(bm){bike+=parseFloat(bm[1]);run+=parseFloat(bm[2]);}
    }
  });
  return{run,bike,swim};
}

function renderStats(){
  const showBoth=athlete==='both';
  const athletes=showBoth?['nicholas','chase']:[athlete];
  const isWeekly=statSubTab==='weekly';
  const range=isWeekly?[todayWk,todayWk]:[1,todayWk];

  const el=document.getElementById('tab-stats');

  const planned=isWeekly?getPlannedMileage([todayWk,todayWk]):getPlannedMileage([1,todayWk]);
  const statsPerAth=athletes.map(a=>({ath:a,...getMileageStats(a,range)}));

  const maxRun=Math.max(...statsPerAth.map(s=>s.run),planned.run,0.1);
  const maxBike=Math.max(...statsPerAth.map(s=>s.bike),planned.bike,0.1);
  const maxSwim=Math.max(...statsPerAth.map(s=>s.swim),planned.swim,0.1);

  function barColor(ath){return ath==='nicholas'?'var(--nick)':'var(--chase)';}
  function mileBar(val,max,color){
    return`<div class="mile-bar-bg"><div class="mile-bar-fill" style="width:${Math.min(100,Math.round(val/max*100))}%;background:${color};"></div></div>`;
  }

  let duoGrid='';
  if(showBoth){
    duoGrid=`<div class="duo-compare">
      ${['nicholas','chase'].map(a=>{
        const s=getMileageStats(a,range);
        return`<div class="duo-card">
          <div class="duo-name ${a}">${ATH_LABEL[a]}</div>
          <div class="duo-val">${s.workoutCount}</div>
          <div class="duo-lbl">workouts logged</div>
          <div style="margin-top:8px;font-size:11px;color:var(--muted);line-height:1.9;">
            🏃 ${s.run.toFixed(1)} mi<br>🚴 ${s.bike.toFixed(1)} mi<br>🏊 ${s.swim.toFixed(1)} mi
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }

  el.innerHTML=`
    <div class="stat-tabs">
      <button class="stat-btn ${statSubTab==='alltime'?'active':''}" onclick="setStatTab('alltime')">All-time</button>
      <button class="stat-btn ${statSubTab==='weekly'?'active':''}" onclick="setStatTab('weekly')">This week</button>
    </div>
    ${duoGrid}
    <div class="card">
      <div class="clabel">${isWeekly?'Week '+todayWk+' mileage (logged vs planned)':'Total miles logged (Wk 1 → '+todayWk+')'}</div>
      ${['Run','Bike','Swim'].map((type,ti)=>{
        const planned_val=ti===0?planned.run:ti===1?planned.bike:planned.swim;
        return`<div class="mile-row">
          <div class="mile-label">${type==='Run'?'🏃':type==='Bike'?'🚴':'🏊'} ${type}</div>
          <div class="mile-bars">
            ${statsPerAth.map(s=>{
              const val=ti===0?s.run:ti===1?s.bike:s.swim;
              const maxV=ti===0?maxRun:ti===1?maxBike:maxSwim;
              return`<div class="mile-bar-wrap">
                <div class="mile-name" style="color:${barColor(s.ath)};font-size:9px;">${showBoth?ATH_LABEL[s.ath]:''}</div>
                ${mileBar(val,maxV,barColor(s.ath))}
                <div class="mile-bar-val">${val.toFixed(1)} mi</div>
              </div>`;
            }).join('')}
            <div class="mile-bar-wrap" style="opacity:.4">
              <div class="mile-name" style="font-size:9px;color:var(--muted);">Plan</div>
              ${mileBar(planned_val,ti===0?maxRun:ti===1?maxBike:maxSwim,'var(--muted)')}
              <div class="mile-bar-val">${planned_val.toFixed(1)} mi</div>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
    <div class="card">
      <div class="clabel">Race targets</div>
      <div style="font-size:12px;color:var(--muted);line-height:2.1;">
        <div>🏊 Swim: <strong style="color:var(--text)">1.2 mi (1,900m)</strong></div>
        <div>🚴 Bike: <strong style="color:var(--text)">56 mi</strong></div>
        <div>🏃 Run: <strong style="color:var(--text)">13.1 mi</strong></div>
        <div>🏁 Total: <strong style="color:var(--text)">70.3 miles · May 8, 2027</strong></div>
      </div>
    </div>
  `;
}

function setStatTab(t){statSubTab=t;renderStats();}

// ── PROGRESS ──────────────────────────────────────────────────────────────

        <div class="pbar">
          <div class="pbar-hd"><span style="font-weight:500;">Phase ${ph.num}: ${ph.name}</span><span style="color:var(--muted);font-size:11px;">${ph.donePer.map((d,i)=>`<span style="color:${athletes[i]==='nicholas'?'var(--nick)':'var(--chase)'}">${d}</span>`).join('/')}/${ph.total}</span></div>

        <div>Overall: <strong style="color:var(--text)">${Math.round(todayWk/46*100)}% complete</strong></div>
      </div>
    </div>

}

// ── ZONES ──────────────────────────────────────────────────────────────────

  const zones=[
    {z:'Z1',name:'Recovery',pct:'50–60%',c:'#5DCAA5',d:'Easy recovery, warm-up, cool-down'},
    {z:'Z2',name:'Aerobic Base',pct:'60–70%',c:'#4FC3F7',d:'Long slow distance — the ENGINE. ~80% of training.'},
    {z:'Z3',name:'Tempo',pct:'70–80%',c:'#EF9F27',d:'Comfortably hard, race-sustainable effort'},
    {z:'Z4',name:'Threshold',pct:'80–90%',c:'#E24B4A',d:'Hard — lactate threshold intervals'},
    {z:'Z5',name:'VO2 Max',pct:'90–100%',c:'#A32D2D',d:'Max effort — short intervals only'},
  ];
  document.getElementById('tab-zones').innerHTML=`
    <div class="card">
      <div class="clabel">Heart rate zones</div>
      ${zones.map(z=>`<div class="zrow">
        <div class="zdot" style="background:${z.c}"></div>
        <div class="zz" style="color:${z.c}">${z.z}</div>
        <div class="zname">${z.name}</div>
        <div class="zpct">${z.pct}</div>
        <div class="zdesc">${z.d}</div>
      </div>`).join('')}
    </div>
    <div class="card"><p class="quote">"80% of training should feel easy (Z2).<br>Trust the process."</p></div>
  `;
}

function changeWeek(dir){viewWeek=Math.min(Math.max(viewWeek+dir,1),46);renderWeek();}

// ── INIT ──────────────────────────────────────────────────────────────────
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}
loadData();
updateHeader();
renderToday();
</script>
</body>
